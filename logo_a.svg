<?xml version="1.0" encoding="UTF-8"?>
<!--
  ВАРИАНТ A — «Референс»
  Один высокий главный язык пламени (слева), S-образный изгиб,
  второй меньший выступ справа. Ближе всего к исходному референсу.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 116">
  <title>Спичка — A</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="100" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4338CA"/>
      <stop offset="35%"  stop-color="#7C3AED"/>
      <stop offset="68%"  stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <clipPath id="mc">
      <rect x="33" y="62" width="34" height="27" rx="13.5"/>
    </clipPath>
  </defs>

  <!-- Силуэт огонь + круглое основание -->
  <path fill="url(#g)" d="
    M 50,113
    C 26,113 11,100 11,82
    C 11,62 17,46 25,32
    C 29,24 31,15 33,8
    C 35,3 38,1 41,4
    C 43,7 44,12 45,18
    C 47,11 51,6 55,9
    C 60,13 58,25 54,33
    C 62,26 72,20 76,27
    C 83,36 88,53 88,69
    C 88,87 83,103 71,111
    C 64,115 57,115 50,113
    Z
  "/>

  <!-- Корпус микрофона (белый, короткий и круглый) -->
  <rect fill="white" x="33" y="62" width="34" height="27" rx="13.5"/>

  <!-- Прорези у краёв (не по центру) — клипованы по форме капсулы -->
  <g clip-path="url(#mc)">
    <rect fill="url(#g)" x="33" y="67"   width="34" height="3.5"/>
    <rect fill="url(#g)" x="33" y="82"   width="34" height="3.5"/>
  </g>

  <!-- Стержень — прямой как спичка -->
  <rect fill="white" x="47.5" y="89" width="5" height="21" rx="2.5"/>
</svg>
